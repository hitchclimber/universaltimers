name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Create signing.properties
        run: |
          echo "storeFile=release.jks" > signing.properties
          echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}" >> signing.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> signing.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> signing.properties

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true